<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>iPhone Preview | FJL Painting</title>
    <style>
      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 24px;
        background: #1d1d1d;
        font-family: Arial, sans-serif;
      }

      .phone {
        width: 430px;
        max-width: 100%;
        border-radius: 38px;
        padding: 18px;
        background: #080808;
        box-shadow: 0 26px 70px rgba(0, 0, 0, 0.42);
      }

      .screen {
        overflow: hidden;
        width: 390px;
        max-width: 100%;
        height: 844px;
        border: 1px solid #2a2a2a;
        border-radius: 28px;
        background: #ffffff;
      }

      iframe {
        display: block;
        width: 390px;
        height: 844px;
        border: 0;
      }
    </style>
  </head>
  <body>
    <div class="phone" aria-label="iPhone 390 by 844 preview">
      <div class="screen">
        <iframe src="index.html" title="FJL Painting mobile preview"></iframe>
      </div>
    </div>
  </body>
</html>
